name: "stellar-perapin-test"

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Run Lint
        run: npm run lint

      - name: Build frontend
        run: npm run build

  smart-contract:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Rust Toolchain
        uses: actions-rust-lang/setup-rusttoolchain@v1

      - name: Run Contract Tests
        run: |
          if [ -f Cargo.toml ]; then
            cargo test
          else
            echo "Cargo.toml not found. Skipping contract tests."
          fi
